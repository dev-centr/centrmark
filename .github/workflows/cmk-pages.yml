name: CMK Pages

on:
  push:
    branches:
      - main
    paths:
      - "examples/**"
      - "haskell/cmk/**"
      - "haskell/README.adoc"
      - "wrappers/**"
      - "tools/vscode-cmk/showcase/**"
      - ".github/workflows/cmk-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cmk-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/examples _site/showcase _site/sources

          cp -R examples/. _site/examples/
          cp -R tools/vscode-cmk/showcase/. _site/showcase/
          cp -R haskell/cmk/. _site/sources/
          cp haskell/README.adoc _site/haskell-README.adoc
          cp wrappers/README.adoc _site/wrappers-README.adoc

          {
            cat <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>CentrMark CMK</title>
            <style>
              body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
              h1, h2 { margin-top: 1.25rem; }
              code { background: #f3f4f6; padding: 0.15rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>CentrMark CMK Pages</h1>
            <p>This site is built from repository CMK assets.</p>
            <h2>Canonical Examples</h2>
            <p>One <code>.cmk</code> file per major topic in <code>examples/</code> (see repository <code>examples/README.md</code>).</p>
            <ul>
          HTML
            for f in examples/*.cmk; do
              b=$(basename "$f")
              printf '              <li><a href="./examples/%s">%s</a></li>\n' "$b" "$b"
            done
            cat <<'HTML'
            </ul>
            <h2>Editor / VS Code showcase</h2>
            <p>Smaller slices used for syntax highlighting and depth checks in the extension.</p>
            <ul>
              <li><a href="./showcase/README.md">Showcase README</a></li>
              <li><a href="./showcase/01-blocks.cmk">01 blocks</a></li>
              <li><a href="./showcase/02-tables.cmk">02 tables</a></li>
              <li><a href="./showcase/03-quotes-and-lists.cmk">03 quotes and lists</a></li>
              <li><a href="./showcase/04-mixed-nesting.cmk">04 mixed nesting</a></li>
              <li><a href="./showcase/05-edge-cases.cmk">05 edge cases</a></li>
              <li><a href="./showcase/06-includes-and-reuse.cmk">06 includes and reuse</a></li>
            </ul>
            <h2>Reference Sources</h2>
            <ul>
              <li><a href="./sources/AST.hs">AST.hs</a></li>
              <li><a href="./sources/Parser.hs">Parser.hs</a></li>
              <li><a href="./sources/Json.hs">Json.hs</a></li>
              <li><a href="./haskell-README.adoc">Haskell README</a></li>
              <li><a href="./wrappers-README.adoc">Wrappers README</a></li>
            </ul>
          </body>
          </html>
          HTML
          } > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
