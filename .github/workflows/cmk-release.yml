name: CMK Release Builds

on:
  push:
    tags:
      - "cmk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: cmk-v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CLI source bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/centrmark-cmk-cli-source.tar.gz -C haskell cmk README.adoc

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: centrmark-cmk-cli-source
          path: dist/centrmark-cmk-cli-source.tar.gz

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare library source bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/centrmark-cmk-library-source.tar.gz -C haskell cmk

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: centrmark-cmk-library-source
          path: dist/centrmark-cmk-library-source.tar.gz

  build-wrappers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare wrappers bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/centrmark-cmk-wrappers-source.tar.gz -C wrappers .

      - name: Upload wrappers artifact
        uses: actions/upload-artifact@v4
        with:
          name: centrmark-cmk-wrappers-source
          path: dist/centrmark-cmk-wrappers-source.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs:
      - build-cli
      - build-library
      - build-wrappers
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: centrmark-cmk-cli-source
          path: dist

      - name: Download library artifact
        uses: actions/download-artifact@v4
        with:
          name: centrmark-cmk-library-source
          path: dist

      - name: Download wrappers artifact
        uses: actions/download-artifact@v4
        with:
          name: centrmark-cmk-wrappers-source
          path: dist

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: ${{ steps.release_tag.outputs.value }}
          files: |
            dist/centrmark-cmk-cli-source.tar.gz
            dist/centrmark-cmk-library-source.tar.gz
            dist/centrmark-cmk-wrappers-source.tar.gz

  publish-renderer-npm:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#cmk-v}"
          PKG_VERSION="$(node -p "require('./packages/cmk-renderer/package.json').version")"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match @centrmark/cmk-renderer version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd packages/cmk-renderer
          pnpm install --frozen-lockfile

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          cd packages/cmk-renderer
          pnpm run build

      - name: Publish @centrmark/cmk-renderer
        shell: bash
        run: |
          set -euo pipefail
          cd packages/cmk-renderer
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
