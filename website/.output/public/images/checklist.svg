<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" role="img" aria-label="Diagram: x/X checklist">
  <rect x="20" y="20" width="600" height="200" rx="16" fill="#111827" opacity="0.05"/>

  <text x="60" y="60" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="18" fill="#0f172a">checklist</text>
  <text x="60" y="95" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="16" fill="#0f172a">x</text>
  <text x="95" y="95" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="16" fill="#0f172a">done items</text>

  <path d="M 60 128 L 76 144 L 110 110" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <text x="60" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="16" fill="#0f172a" opacity="0.0">x</text>
  <text x="95" y="162" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="16" fill="#0f172a">X means blocked/pending</text>

  <text x="60" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="16" fill="#0f172a">X</text>
  <text x="95" y="200" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-size="16" fill="#0f172a">blocked items</text>
</svg>

